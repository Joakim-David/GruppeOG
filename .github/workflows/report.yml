name: Build Report PDF

on:
  push:
    paths:
      - 'report/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

      - name: Build PDF
        run: |
          cd report
          pandoc report.md \
            -o build/BSc_group_g.pdf \
            --pdf-engine=pdflatex \
            --resource-path=.:images \
            -V colorlinks=true \
            -V linkcolor=blue \
            -V urlcolor=blue

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: BSc_group_g
          path: report/build/BSc_group_g.pdf

      - name: Commit PDF to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add report/build/BSc_group_g.pdf
          git diff --staged --quiet || git commit -m "Build report PDF"
          git push
