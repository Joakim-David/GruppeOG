name: Hadolint

on:
  push:
    branches: [main]
    paths-ignore:
      - 'report/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'report/**'

jobs:
  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning   # fail on warning or above
          ignore: DL3008              # ignore specific rules