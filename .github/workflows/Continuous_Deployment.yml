---
name: Continuous Deployment
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 12 * * 2'
  workflow_dispatch:
    manual: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minitwitimage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage:webbuildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/minitwitimage:webbuildcache,mode=max

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Copy docker-compose + config files to server
        run: |
          scp -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            docker-compose.yml $SSH_USER@$SSH_HOST:~/docker-compose.yml
          ssh $SSH_USER@$SSH_HOST -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            "docker compose stop grafana prometheus loki alloy && rm -rf ~/grafana ~/monitoring ~/loki ~/alloy"
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            grafana $SSH_USER@$SSH_HOST:~/
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            monitoring $SSH_USER@$SSH_HOST:~/
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            loki $SSH_USER@$SSH_HOST:~/
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            alloy $SSH_USER@$SSH_HOST:~/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Deploy to server
        run: |
          ssh $SSH_USER@$SSH_HOST -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
            "chmod 666 ~/latest.txt && docker login -u '$DOCKER_USERNAME' -p '$DOCKER_PASSWORD' && export POSTGRES_PSW='$POSTGRES_PSW' && docker compose pull && docker compose up -d"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          POSTGRES_PSW: ${{ secrets.POSTGRES_PSW }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}